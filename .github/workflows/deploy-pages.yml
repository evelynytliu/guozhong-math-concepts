name: Deploy to GitHub Pages

# 每次 push 到 main 就重新建置靜態網站並部署到 GitHub Pages。
# 建置時設 BUILD_TARGET=pages → next.config 切到 output: 'export'。
# 進度/解釋/練習/診斷會連同一個 Supabase（金鑰由 Secrets 注入；用密碼門擋陌生人）。
# 靜態站本身沒有後端 AI route：若設了 NEXT_PUBLIC_AI_BASE_URL（家裡電腦的 tunnel），
# AI 請求會打回本機 claude login；沒設則 AI 自動退回靜態/本地啟發式。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          BUILD_TARGET: pages
          # 公開版也連同一個 Supabase（兩邊資料共通）。這些值會被打進靜態網站，
          # 所以用密碼門（NEXT_PUBLIC_APP_PASSCODE）擋住路過的陌生人。
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_PASSCODE: ${{ secrets.NEXT_PUBLIC_APP_PASSCODE }}
          # 家裡電腦的 AI tunnel 網址（Option C：線上答題、只有 AI 連本機）。
          # 沒設這個 Secret 時，線上站的 AI 會自動退回靜態/本地啟發式。
          NEXT_PUBLIC_AI_BASE_URL: ${{ secrets.NEXT_PUBLIC_AI_BASE_URL }}
      - name: Disable Jekyll (keep _next folder)
        run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
