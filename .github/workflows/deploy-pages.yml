name: Deploy to GitHub Pages

# 每次 push 到 main 就重新建置靜態網站並部署到 GitHub Pages。
# 建置時設 BUILD_TARGET=pages → next.config 切到 output: 'export'。
# CI 沒有 .env.local，所以網站自動用 localStorage（不帶 Supabase 金鑰、不外洩）。
# AI route 在靜態匯出時為空，前端會自動退回靜態解釋。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          BUILD_TARGET: pages
      - name: Disable Jekyll (keep _next folder)
        run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
